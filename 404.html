<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Reindirizzamento…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Fallback per GitHub Pages: porta tutto alla home mantenendo la path come hash -->
  <meta http-equiv="refresh" content="0; url=/ricette-lista-spesa/#" />
  <script>
    // Reindirizza preservando la path visitata come hash, utile se in futuro gestisci routing lato client
    (function () {
      var path = location.pathname.replace(/^\/+/, "");
      var base = "/ricette-lista-spesa/#";
      // Se il repo cambia nome, aggiorna il base sopra
      location.replace(base + path + location.search + location.hash);
    })();
  </script>
  <style>
    body{font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding:24px}
  </style>
</head>
<body>
  <p>Reindirizzamento in corso…</p>
</body>
</html>
