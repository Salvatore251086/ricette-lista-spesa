<header>
  <h1>Ricette e Lista Spesa</h1>
</header>

<main id="main">
  <p>Trova ricette dai tuoi ingredienti. Crea la lista spesa. Funziona anche offline.</p>

  <button id="installBtn" hidden>Installa l’app</button>
  <p id="iosHint" hidden>Su iPhone apri in Safari. Tocca Condividi. Aggiungi a Home.</p>

  <!-- Contenuti della tua app -->
</main>

<div aria-live="polite" id="announce" class="sr-only"></div>

<script defer src="/ricette-lista-spesa/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/ricette-lista-spesa/service-worker.js', { scope: '/ricette-lista-spesa/' })
}
let deferredPrompt = null
const installBtn = document.getElementById('installBtn')
const iosHint = document.getElementById('iosHint')

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault()
  deferredPrompt = e
  installBtn.hidden = false
})

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return
  deferredPrompt.prompt()
  await deferredPrompt.userChoice
  deferredPrompt = null
  installBtn.hidden = true
})

window.addEventListener('appinstalled', () => {
  const el = document.getElementById('announce')
  if (el) el.textContent = 'App installata'
})

if (window.navigator.standalone === false) {
  iosHint.hidden = false
}
</script>
